name: readme-scribe

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */1 * *'
  push:
    branches:
      - 'master'

env:
  GO_VERSION: 1.26
  MARKSCRIBE_REF: v0.6.0

jobs:
  readme-scribe:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push changes back to the repo
    steps:
      -
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      -
        name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "${{ env.GO_VERSION }}"
      -
        name: Install markscribe
        run: |
          set -ex
          go install github.com/muesli/markscribe@${{ env.MARKSCRIBE_REF }}
      -
        name: Generate README
        run: |
          set -ex
          markscribe -write README.md templates/README.md.tpl
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      -
        name: Commit and push README
        run: |
          if git diff --quiet -- README.md; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md
          git commit -m "Update generated README"
          git push origin HEAD:master
